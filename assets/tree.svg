<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%">
  <!-- Tree Graphic -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Trunk -->
    <line x1="50" y1="110" x2="50" y2="70" stroke-width="6" />
    <line x1="35" y1="110" x2="65" y2="110" stroke-width="4" />
    
    <!-- Branches -->
    <line x1="50" y1="85" x2="35" y2="70" />
    <line x1="50" y1="80" x2="65" y2="65" />
    
    <!-- Geometric Foliage (Neon Cyan glow) -->
    <!-- Large bottom triangle -->
    <polygon points="50,20 20,80 80,80" stroke="#00f3ff" stroke-width="4" fill="#0f172a" fill-opacity="0.6" />
    <!-- Medium middle triangle -->
    <polygon points="50,10 25,60 75,60" stroke="#00f3ff" stroke-width="3" fill="#0f172a" fill-opacity="0.6" />
    <!-- Small top triangle -->
    <polygon points="50,0 30,40 70,40" stroke="#ffffff" stroke-width="2" fill="#0f172a" fill-opacity="0.6" />
    
    <!-- Glowing core in the center of the tree foliage -->
    <circle cx="50" cy="50" r="6" fill="#00f3ff" stroke="none" />
  </g>
</svg>
